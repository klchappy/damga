server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (Cloudflare proxy önünde olsa da defense-in-depth)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;

    # CSP — ENFORCE modunda (Report-Only kaldırıldı).
    # 3rd-party domain'ler:
    #   - Sentry: browser.sentry-cdn.com, *.ingest.sentry.io, *.ingest.de.sentry.io
    #   - Supabase: *.supabase.co (websocket dahil)
    #   - PostHog: *.posthog.com (EU + US instance'lar için)
    #   - Google Fonts: fonts.googleapis.com (style) + fonts.gstatic.com (font)
    #
    # 'unsafe-inline' style icin Tailwind/Sentry'nin runtime style injection'ı zorunlu.
    # 'unsafe-eval' script icin de Sentry/Vite production bundle'ında gerekli olabilir.
    # Bu kısıtları daha sonra nonce-based CSP ile daraltabiliriz (orta vadeli iyileştirme).
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self' 'unsafe-inline' 'unsafe-eval' https://browser.sentry-cdn.com https://*.ingest.sentry.io https://*.ingest.de.sentry.io https://*.posthog.com;
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
         img-src 'self' data: blob: https://*.supabase.co https://*.ingest.sentry.io https://*.ingest.de.sentry.io https://*.posthog.com;
         font-src 'self' data: https://fonts.gstatic.com;
         connect-src 'self' https://api.damga.deploi.net https://*.supabase.co wss://*.supabase.co https://*.ingest.sentry.io https://*.ingest.de.sentry.io https://*.posthog.com;
         media-src 'self' blob:;
         worker-src 'self' blob:;
         frame-ancestors 'self';
         base-uri 'self';
         form-action 'self';
         object-src 'none';
         upgrade-insecure-requests" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff2;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # /.well-known/ erişimi (security.txt, ACME challenge vb. için)
    location ^~ /.well-known/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Diğer dot-files erişimi (gizli dosyalar) engellensin
    location ~ /\. {
        deny all;
        return 404;
    }
}
