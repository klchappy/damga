# Damga — otomatik bağımlılık güncellemeleri
# https://docs.github.com/en/code-security/dependabot
version: 2
updates:
  # pnpm workspace root (kök package.json + root devDependencies)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Patch + minor: tek PR
      minor-patch:
        update-types:
          - "minor"
          - "patch"
      # Major güncellemeler: ayrı (manuel review)
      majors:
        update-types:
          - "major"

  # API workspace
  - package-ecosystem: "npm"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "api"
    commit-message:
      prefix: "chore(deps,api)"
    groups:
      minor-patch:
        update-types: ["minor", "patch"]

  # Web workspace
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "web"
    commit-message:
      prefix: "chore(deps,web)"
    groups:
      minor-patch:
        update-types: ["minor", "patch"]

  # DB package
  - package-ecosystem: "npm"
    directory: "/packages/db"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "db"
    commit-message:
      prefix: "chore(deps,db)"

  # Shared package
  - package-ecosystem: "npm"
    directory: "/packages/shared"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "shared"
    commit-message:
      prefix: "chore(deps,shared)"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"

  # Docker base image'leri (apps/api/Dockerfile + apps/web/Dockerfile)
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker,api)"

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker,web)"
